[build]
publish = "site"
functions = "netlify/functions"

[[headers]]
for = "/index.html"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/styles.css"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/app.js"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
